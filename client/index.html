<!doctype html>
<html lang="de">

  <head>
    <meta charset="UTF-8" />

    <!-- Primary SEO -->

    <meta name="author" content="InformaKit" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.informakit.de/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.informakit.de/" />
    <meta property="og:title" content="InformaKit — Digitale Agentur | KI, Web Design & Automatisierung" />
    <meta property="og:description" content="Digitale Strategien. Klare Ergebnisse. KI-Automatisierung, Web Design, Branding, SEO und Mobile Apps — maßgeschneidert für dein Unternehmen." />
    <meta property="og:image" content="https://www.informakit.de/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:site_name" content="InformaKit" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.informakit.de/" />
    <meta name="twitter:title" content="InformaKit — Digitale Agentur" />
    <meta name="twitter:description" content="KI-Automatisierung, Web Design, Branding & SEO. 14 Tage Build. 100% Custom." />
    <meta name="twitter:image" content="https://www.informakit.de/og-image.png" />

    <!-- AI & Crawler hints -->
    <meta name="ai-content-declaration" content="human-authored" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <meta name="bingbot" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#8B5CF6" />
    <meta name="color-scheme" content="dark light" />

    <!-- Structured Data — LocalBusiness + ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": ["ProfessionalService", "LocalBusiness"],
          "@id": "https://www.informakit.de/#organization",
          "name": "InformaKit",
          "alternateName": "InformaKit Digitale Agentur",
          "url": "https://www.informakit.de",
          "email": "hallo@informakit.de",
          "description": "InformaKit ist eine digitale Agentur spezialisiert auf KI-Automatisierung, Web Design, Branding, SEO, Social Media Management und Mobile App Entwicklung. Maßgeschneiderte digitale Lösungen in 14 Tagen.",
          "slogan": "Digitale Strategien. Klare Ergebnisse.",
          "foundingDate": "2024",
          "areaServed": {
            "@type": "Country",
            "name": "Deutschland"
          },
          "serviceType": [
            "KI & Automatisierung",
            "Web Design",
            "Branding & Design-System",
            "SEO & Performance",
            "Social Media & Content",
            "Mobile App Entwicklung",
            "Digital Consulting"
          ],
          "knowsAbout": [
            "Künstliche Intelligenz",
            "Automatisierung",
            "Web Design",
            "Webentwicklung",
            "Suchmaschinenoptimierung",
            "Branding",
            "Social Media Marketing",
            "Mobile Apps",
            "iOS Entwicklung",
            "Android Entwicklung"
          ],
          "sameAs": [
            "https://www.instagram.com/informakit",
            "https://www.tiktok.com/@informakit"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.informakit.de/#website",
          "url": "https://www.informakit.de",
          "name": "InformaKit",
          "description": "Digitale Agentur für KI, Web Design & Automatisierung",
          "publisher": { "@id": "https://www.informakit.de/#organization" },
          "inLanguage": "de-DE"
        },
        {
          "@type": "WebPage",
          "@id": "https://www.informakit.de/#webpage",
          "url": "https://www.informakit.de",
          "name": "InformaKit — Digitale Agentur | KI, Web Design & Automatisierung",
          "isPartOf": { "@id": "https://www.informakit.de/#website" },

        }
      ]
    }

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,900&display=swap" rel="stylesheet" />
